<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumanity | OIDC Login Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f6da09;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #081c49;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background:  #081c49;
            color: #081c49; /* Lumanity-inspired blue */
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
       .login-btn {
            background-color: #081c49;
            color: white;
            border: none;
            padding: 24px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
           margin: 12px;
           
        }
        .login-btn:hover {
            background-color: #003366;
        }
        #result {
            display: none;
            text-align: left;
            margin-top: 2rem;
            background: #eee;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }
        pre {
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><img src="https://lumanity.com/wp-content/themes/lumanity/dist/img/logo.svg" /></div>
    <p class="subtitle">Identity & Access Demonstration</p>

    <div id="auth-section">
        <button id="login-btn-merck" class="login-btn">Log In to Merck Environment</button>

        <br/>
         <button id="login-btn-pfizer" class="login-btn">Log In to Pfizer Environment</button>
    </div>

    <div id="result">
        <h3>ID Token Claims</h3>
        <pre id="claims-output"></pre>
        <button onclick="window.location.hash=''; location.reload();" style="margin-top:10px; cursor:pointer;">Clear / Logout</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const CONFIG = {
        merck_clientId: '0f235e86-7767-43d7-b8a3-6abb6942b71b', // Replace with your Client ID
        merck_authority: 'https://auth.pingone.eu/ea1f1b9c-05ce-4af7-a2b8-317369a81a27/as', // Replace with provider URL

        pfizer_clientId: '7695c4bf-bb67-45f5-9d8f-e95ee5da7062', // Replace with your Client ID
        pfizer_authority: 'https://auth.pingone.eu/1a0d7ce0-20e5-41db-9592-f2df967ae364/as', // Replace with provider URL
        
        redirectUri: window.location.origin + window.location.pathname,
        scope: 'openid profile email'
    };

    const loginBtnMerck = document.getElementById('login-btn-merck');
    const loginBtnPfizer = document.getElementById('login-btn-pfizer');
    const resultDiv = document.getElementById('result');
    const claimsOutput = document.getElementById('claims-output');

    // 1. Handle the Login Button Click
    loginBtnMerck.addEventListener('click', () => {
        const nonce = Math.random().toString(36).substring(2);
        const state = Math.random().toString(36).substring(2);
        
        // Store state/nonce to verify on return if needed
        localStorage.setItem('oidc_state', state);

        const authUrl = `${CONFIG.merck_authority}/authorize?` +
            `client_id=${encodeURIComponent(CONFIG.merck_clientId)}&` +
            `redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&` +
            `response_type=id_token&` + 
            `scope=${encodeURIComponent(CONFIG.scope)}&` +
            `state=${state}&` +
            `nonce=${nonce}`;

        window.location.href = authUrl;
    });

     loginBtnPfizer.addEventListener('click', () => {
        const nonce = Math.random().toString(36).substring(2);
        const state = Math.random().toString(36).substring(2);
        
        // Store state/nonce to verify on return if needed
        localStorage.setItem('oidc_state', state);

        const authUrl = `${CONFIG.pfizer_authority}/authorize?` +
            `client_id=${encodeURIComponent(CONFIG.pfizer_clientId)}&` +
            `redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&` +
            `response_type=id_token&` + 
            `scope=${encodeURIComponent(CONFIG.scope)}&` +
            `state=${state}&` +
            `nonce=${nonce}`;

        window.location.href = authUrl;
    });

    // 2. Process the Callback
    window.onload = () => {
        const hash = window.location.hash.substring(1);
        if (hash) {
            const params = new URLSearchParams(hash);
            const idToken = params.get('id_token');

            if (idToken) {
                decodeToken(idToken);
            }
        }
    };

    // 3. Decode JWT (ID Token)
    function decodeToken(token) {
        try {
            // A JWT is: Header.Payload.Signature
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const claims = JSON.parse(jsonPayload);
            
            // UI Updates
            document.getElementById('auth-section').style.display = 'none';
            resultDiv.style.display = 'block';
            claimsOutput.textContent = JSON.stringify(claims, null, 4);
        } catch (e) {
            console.error("Token decoding failed", e);
            alert("Error parsing the ID Token.");
        }
    }
</script>

</body>
</html>
